name: Build ShotPut Lite (Windows .exe)

# Se ruleaza automat cand faci "git push" pe branch-ul main,
# sau manual din tab-ul "Actions" al repo-ului (butonul "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Descarca codul din repo
        uses: actions/checkout@v4

      - name: Instaleaza Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependintele
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller reportlab tkinterdnd2 plyer

      - name: Compileaza .exe cu PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ShotPut Lite" `
            --icon=ShotPutLite.ico `
            --hidden-import=offload_engine `
            --hidden-import=pdf_report `
            --hidden-import=config `
            --collect-all reportlab `
            --collect-all tkinterdnd2 `
            main.py

      - name: Incarca .exe ca artefact descarcabil
        uses: actions/upload-artifact@v4
        with:
          name: ShotPut-Lite-Windows
          path: dist/ShotPut Lite.exe
