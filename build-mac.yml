name: Build ShotPut Lite (Mac .app)

# Se ruleaza automat cand faci "git push" pe branch-ul main,
# sau manual din tab-ul "Actions" al repo-ului (butonul "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Descarca codul din repo
        uses: actions/checkout@v4

      - name: Instaleaza Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependintele
        run: |
          python -m pip install --upgrade pip
          pip install py2app reportlab tkinterdnd2 plyer

      - name: Compileaza .app cu py2app
        run: python setup.py py2app

      - name: Arhiveaza .app (ditto pastreaza corect permisiunile Mac)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "ShotPut Lite.app" "ShotPut-Lite-Mac.zip"

      - name: Incarca .zip ca artefact descarcabil
        uses: actions/upload-artifact@v4
        with:
          name: ShotPut-Lite-Mac
          path: dist/ShotPut-Lite-Mac.zip

      - name: Creeaza instalatorul .pkg (curata automat carantina la instalare)
        run: |
          mkdir -p pkgroot/Applications
          cp -R "dist/ShotPut Lite.app" "pkgroot/Applications/ShotPut Lite.app"
          mkdir -p scripts
          cat > scripts/postinstall << 'POSTEOF'
          #!/bin/bash
          xattr -cr "/Applications/ShotPut Lite.app" || true
          exit 0
          POSTEOF
          chmod +x scripts/postinstall
          pkgbuild --root pkgroot \
            --scripts scripts \
            --identifier personal.shotputlite \
            --version 1.0.0 \
            --install-location / \
            "ShotPut-Lite-Mac-Installer.pkg"

      - name: Incarca .pkg ca artefact descarcabil
        uses: actions/upload-artifact@v4
        with:
          name: ShotPut-Lite-Mac-Installer
          path: ShotPut-Lite-Mac-Installer.pkg
